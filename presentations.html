<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentations | Liver Transplant Anaesthesia</title>
  <style>
    :root {
      --primary: #2c3e50;
      --accent: #3498db;
      --bg: #f5f5f5;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: var(--bg);
    }

    nav {
      text-align: center;
      margin-bottom: 30px;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: var(--accent);
      font-weight: bold;
    }

    h1 {
      text-align: center;
      color: var(--primary);
      margin-bottom: 40px;
    }

    /* Grid for the cards */
    .presentation-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .thumbnail {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-bottom: 1px solid #eee;
    }

    .card-content {
      padding: 20px;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--primary);
      margin-bottom: 15px;
      display: block;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 0.9rem;
    }

    .btn:hover {
      background: #2980b9;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">← Back to Dashboard</a>
  <a href="OLT.html">OLT Assessment</a>
  <a href="reading.html">Reading Material</a>
</nav>

<h1>Course Presentations</h1>

<div class="presentation-grid" id="presentation-container">
  </div>

<script>
  // AUTOMATION: Just add your presentation details here!
  const presentations = [
    {
      title: "Preoperative Evaluation for OLT",
      link: "https://docs.google.com/presentation/d/1r_hPZq0Dzu0Xui2yWy-FwcMA2RIXRbzqFzeQdXum-Nw/edit",
      thumb: "thumb1.png"
    },
    {
      title: "Intraoperative Management & TEE",
      link: "https://docs.google.com/presentation/d/1KRLCIGYSkwk_wNe26P5LMOjb657GaXtG0olCIvfp_a8/edit",
      thumb: "thumb2.png"
    },
    {
      title: "Coagulopathy in Cirrhosis",
      link: "#",
      thumb: "thumb3.png" // If image doesn't exist, it shows alt text
    }
  ];

  const container = document.getElementById('presentation-container');

  // This loop automatically builds the HTML for each item in the list above
  presentations.forEach(ppt => {
    const card = document.createElement('div');
    card.className = 'card';
    
    card.innerHTML = `
      <img src="${ppt.thumb}" class="thumbnail" alt="${ppt.title}">
      <div class="card-content">
        <span class="card-title">${ppt.title}</span>
        <a href="${ppt.link}" target="_blank" class="btn">View Presentation</a>
      </div>
    `;
    
    container.appendChild(card);
  });
</script>

</body>
</html>
